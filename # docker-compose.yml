# docker-compose.yml
# Runs the FastAPI backend and React frontend together locally.
#
# Usage:
#   docker compose up --build        ← first time
#   docker compose up                ← subsequent runs
#   docker compose down              ← stop everything
#
# After running:
#   Backend  → http://localhost:8000
#   API docs → http://localhost:8000/docs
#   Frontend → http://localhost:3000

version: '3.9'

services:

  # ── FastAPI Backend ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carbonwise_backend
    ports:
      - "8000:8000"
    volumes:
      # Mount models folder so you can update .pkl files
      # without rebuilding the Docker image
      - ./backend/models:/app/models:ro
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000
      - APP_VERSION=1.0.0
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── React Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: carbonwise_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
